---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: crossplane
spec:
  interval: 30m
  chart:
    spec:
      chart: crossplane
      version: 2.2.0
      sourceRef:
        kind: HelmRepository
        name: crossplane
        namespace: flux-system
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    crds: CreateReplace
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    provider:
      packages:
        - ghcr.io/vshn/provider-minio:v0.4.5
    function:
      packages:
        - xpkg.crossplane.io/crossplane-contrib/function-patch-and-transform:v0.10.3
